name: CI - Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'yarn.lock'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'yarn.lock'

jobs:
  test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint --filter=@mio/web

      - name: Type Check
        run: yarn check-types --filter=@mio/web

      - name: Run Tests
        run: yarn test --filter=@mio/web

      - name: React Doctor
        uses: millionco/react-doctor@main
        with:
          directory: apps/web
          diff: main
