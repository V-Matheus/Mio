services:
  postgres-core:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${CORE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CORE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CORE_POSTGRES_DB}
    ports:
      - "${CORE_POSTGRES_PORT}:5432"
    volumes:
      - postgres-core-data:/var/lib/postgresql
    restart: unless-stopped

  postgres-gamification:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${GAMIFICATION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${GAMIFICATION_POSTGRES_PASSWORD}
      POSTGRES_DB: ${GAMIFICATION_POSTGRES_DB}
    ports:
      - "${GAMIFICATION_POSTGRES_PORT}:5432"
    volumes:
      - postgres-gamification-data:/var/lib/postgresql
    restart: unless-stopped

  postgres-achievements:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${ACHIEVEMENTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ACHIEVEMENTS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ACHIEVEMENTS_POSTGRES_DB}
    ports:
      - "${ACHIEVEMENTS_POSTGRES_PORT}:5432"
    volumes:
      - postgres-achievements-data:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

  # Only this service declares `build:`. The image is built once and reused
  # by the other 5 services via `image: mio-api-dev` below.
  api-gateway:
    image: mio-api-dev
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile.dev
    command: yarn workspace @mio/api dev:gateway
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    volumes:
      - ../../:/app
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  api-core:
    image: mio-api-dev
    command: yarn workspace @mio/api dev:core
    env_file:
      - .env
    expose:
      - "5001"
    volumes:
      - ../../:/app
    depends_on:
      - api-gateway
      - postgres-core
    restart: unless-stopped

  api-gamification:
    image: mio-api-dev
    command: yarn workspace @mio/api dev:gamification
    env_file:
      - .env
    expose:
      - "5002"
    volumes:
      - ../../:/app
    depends_on:
      - api-gateway
      - postgres-gamification
    restart: unless-stopped

  api-achievements:
    image: mio-api-dev
    command: yarn workspace @mio/api dev:achievements
    env_file:
      - .env
    expose:
      - "5003"
    volumes:
      - ../../:/app
    depends_on:
      - api-gateway
      - postgres-achievements
    restart: unless-stopped

  api-messenger:
    image: mio-api-dev
    command: yarn workspace @mio/api dev:messenger
    env_file:
      - .env
    expose:
      - "5004"
    volumes:
      - ../../:/app
    depends_on:
      - api-gateway
    restart: unless-stopped

  api-notifications:
    image: mio-api-dev
    command: yarn workspace @mio/api dev:notifications
    env_file:
      - .env
    expose:
      - "5005"
    volumes:
      - ../../:/app
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres-core-data:
  postgres-gamification-data:
  postgres-achievements-data:
  redis-data:
  rabbitmq-data:
